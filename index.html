<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌻 & 🦦 專屬心跳考卷</title>
    <style>
        :root {
            --love-pink: #ff758c;
            --soft-pink: #ff7eb3;
            --bg: #fff0f3;
        }

        body {
            font-family: 'PingFang TC', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #quiz-card {
            background: white;
            width: 100%;
            max-width: 480px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 50px rgba(255, 117, 140, 0.2);
        }

        .progress {
            color: var(--love-pink);
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            text-align: right;
        }

        .question {
            font-size: 1.2rem;
            font-weight: bold;
            color: #444;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        button.opt {
            padding: 15px;
            border: 2px solid #ffe5eb;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            text-align: left;
            color: #555;
        }

        button.opt:hover {
            background: #fff5f7;
            border-color: var(--love-pink);
            transform: translateY(-2px);
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 85%;
            max-width: 350px;
            text-align: center;
        }

        .reason-box {
            background: #fff9fa;
            border: 1px dashed var(--love-pink);
            padding: 15px;
            margin: 15px 0;
            font-size: 0.95rem;
            color: #777;
            line-height: 1.6;
            border-radius: 12px;
        }

        .next-btn {
            background: linear-gradient(45deg, var(--love-pink), var(--soft-pink));
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        #final {
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="quiz-card">
        <div id="game">
            <span class="progress" id="p-bar">1 / 20</span>
            <div class="question" id="q-txt"></div>
            <div class="options" id="opt-list"></div>
        </div>
        <div id="final">
            <h1 style="color: var(--love-pink);">💋 測驗結束 💋</h1>
            <p id="score-txt" style="font-size: 2.5rem; font-weight: bold;"></p>
            <p id="eval-txt" style="margin-bottom: 30px; color: #666;"></p>
            <button class="next-btn" onclick="location.reload()">再親一次 (重新開始)</button>
        </div>
    </div>

    <div id="overlay">
        <div class="modal">
            <div id="status-icon" style="font-size: 3rem; margin-bottom: 10px;"></div>
            <div id="status-title" style="font-weight: bold; font-size: 1.2rem; color: #333;"></div>
            <div class="reason-box" id="reason-txt"></div>
            <button class="next-btn" onclick="goNext()">繼續下一題</button>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "🌻 曾評價 🦦 的某件服裝分數是「60 分」，是因為這件衣服在哪裡「開了兩個洞」？", a: ["背後", "胸前", "腰部側面", "大腿處"], c: 2, r: "🌻 當時看到照片直接驚呼：『側面開兩個洞分數超高』，還說這件太危險了。" },
            { q: "🌻 看到 🦦 穿某件褲子的照片後，曾直白地稱讚她的身材哪部分「很翹」？", a: ["胸部", "屁股", "肩膀", "嘴唇"], c: 1, r: "在 3 月中旬的對話中，🌻 看到照片後大方稱讚 🦦 的屁股很翹，曲線很美。" },
            { q: "🌻 有一套評價 🦦 服裝尺度的「體表面積公式」，請問哪一個部位被他列為「危險等級最高」？", a: ["鎖骨", "側腰/胸部側邊", "膝蓋", "手肘"], c: 1, r: "🌻 曾認真地說側邊開洞或低胸的衣服危險係數直接爆表，他不希望別人盯著妳看。" },
            { q: "🌻 曾用哪一個形容詞來感嘆 🦦 的「美腿」？", a: ["還好而已", "真的好扯", "一般般", "太細了"], c: 1, r: "🌻 曾多次在看到 🦦 的全身照或腿部特寫時，發自內心地感嘆：『妳的腿真的好扯』。" },
            { q: "🦦 曾問 🌻 某件衣服會不會太露，🌻 雖然說 60 分，但也叮囑 🦦 穿這件出門要？", a: ["多穿一件外套", "只能穿給他看", "大方走在路上", "貼滿暖暖包"], c: 1, r: "🌻 的佔有欲爆發，雖然覺得美，但還是忍不住說這種尺度以後只能在家穿給他看。" },
            { q: "🌻 製作的專屬 GPT 在「深夜時段」會代為回覆什麼色色的訊息？", a: ["我睡著了", "想抱著妳睡", "想看妳的照片", "我在夢裡親妳"], c: 1, r: "🌻 設計的自動回覆中包含想抱著 🦦 睡覺的甜蜜內容，讓他在夢中也黏著妳。" },
            { q: "🦦 某次累到打錯字，把「教練漏掉」打成「焦糖漏掉」，🌻 當時笑說這個錯字聽起來很？", a: ["色色的", "甜甜的", "笨笨的", "酸酸的"], c: 1, r: "🌻 覺得這個錯字很有妳的風格，聽起來讓心頭甜甜的。" },
            { q: "兩人達成的「化解尷尬協議」是如果對話突然卡住，就必須？", a: ["親一下", "掛電話", "抱抱", "發一張醜照"], c: 2, r: "你們約定的『尷尬就抱抱』是兩人最親密的肢體接觸約定。" },
            { q: "🌻 教 🦦 使用 iMessage 時，提到「藍色訊息」代表？", a: ["要錢", "不用錢", "已讀", "對方在打字"], c: 1, r: "這是 🌻 最早教妳的 iMessage 小知識：藍色是不花錢的浪漫。" },
            { q: "🌻 曾向 🦦 認真解釋賽車的「MGU-K」系統。當時 🦦 的反應更傾向於？", a: ["認真聽講", "覺得想睡覺", "想親 🌻 叫他閉嘴", "聽不懂但覺得帥"], c: 3, r: "這就是你們的日常，🌻 分享專業，🦦 負責在另一頭覺得男友很厲害。" },
            { q: "🌻 曾發動態或傳訊息稱讚 🦦 的「素顏」或「睡前照」感覺如何？", a: ["很像大嬸", "依然很美、想親", "很普通", "沒感覺"], c: 1, r: "不論 🦦 覺得自己多狼狽，在 🌻 眼中永遠是那個讓他心動、想親親的人。" },
            { q: "🌻 在 Valorant 中最擅長的角色 Raze 拿到高擊殺時，他會想跟 🦦 討什麼獎勵？", a: ["獎金", "抱抱跟誇獎", "請喝飲料", "打掃房間"], c: 1, r: "每當 🌻 表現出色時，最期待的就是 🦦 的『好棒』和視訊裡的抱抱。" },
            { q: "🦦 在跳完 Jazz 課後，跟 🌻 抱怨自己全身痠痛，🌻 第一個反應是？", a: ["嘲笑她體力差", "想幫她按摩", "叫她多喝水", "叫她趕快睡覺"], c: 1, r: "🌻 在對話中展現了體貼的一面，即便隔著螢幕也想幫疲累的 🦦 舒壓。" },
            { q: "兩人的通話紀錄曾長達 5 小時 20 分鐘，這期間你們通常在做什麼？", a: ["瘋狂吵架", "即便不說話也掛著陪伴", "玩遊戲", "看電影"], c: 1, r: "你們最甜蜜的模式就是掛著語音，聽著彼此的呼吸聲和生活雜訊。" },
            { q: "🌻 為了🦦做了什麼訊息，讓🦦能無時無刻感到安心？", a: ["設計陷阱讓🦦掉進去", "自動回訊息系統", "一直說愛你", "陪🦦睡覺"], c: 2, r: "🌻 用技術解決 🦦 的煩惱，這是資工系男友最實質的溫柔。" },
            { q: "🌻 的「自動定位報平安」訊息，通常在什麼時候會跳出來？", a: ["出門上班時", "抵達家裡時", "吃飯時", "要睡覺時"], c: 1, r: "每天的『已抵達中壢區住家』是 🌻 給 🦦 最穩定的安全感。" },
            { q: "🦦 提到自己的媽媽對 🌻 很感興趣，主要是因為 🌻 是 🦦 的？", a: ["大學同學", "高中糾察隊學長", "網友", "同事"], c: 1, r: "這個身分讓媽媽問了超多問題，也讓兩人的緣分聽起來更像校園純愛。" },
            { q: "在 WBC 中韓大戰比數 22:2 時，🌻 曾開玩笑問 🦦 要不要？", a: ["一起去打球", "一起看球賽直播", "一起睡覺", "一起出去吃宵夜"], c: 1, r: "🌻 總是想把生活中的每個刺激瞬間都跟 🦦 分享。" },
            { q: "🌻 曾提到他正在寫的網頁專案「最討厭食物大賽」，他曾問 🦦 討厭吃什麼嗎？", a: ["有", "沒有，他只是在分享邏輯", "他強迫 🦦 吃", "他不准 🦦 挑食"], c: 1, r: "🌻 當時正陷在程式邏輯裡，雖然在分享專案，但心裡其實更想聽 🦦 的聲音。" },
            { q: "🌻 對於 🦦 穿「瑜珈褲」的評價，最核心的關鍵字是？", a: ["顯瘦", "曲線太明顯、想抱", "顏色不好看", "太運動風"], c: 1, r: "對於身材極佳的 🦦，穿上瑜珈褲後的曲線讓 🌻 經常在對話中表示『扛不住』。" }
        ];

        let curr = 0;
        let score = 0;

        function render() {
            const d = quizData[curr];
            document.getElementById("p-bar").innerText = `${curr + 1} / 20`;
            document.getElementById("q-txt").innerText = d.q;
            const list = document.getElementById("opt-list");
            list.innerHTML = "";
            d.a.forEach((t, i) => {
                const b = document.createElement("button");
                b.className = "opt";
                b.innerText = t;
                b.onclick = () => check(i);
                list.appendChild(b);
            });
        }

        function check(i) {
            const d = quizData[curr];
            const isC = i === d.c;
            const overlay = document.getElementById("overlay");
            const icon = document.getElementById("status-icon");
            const title = document.getElementById("status-title");
            const reason = document.getElementById("reason-txt");

            if (isC) {
                score += 5;
                icon.innerText = "💋";
                title.innerText = "完全答對！";
            } else {
                icon.innerText = "🙊";
                title.innerText = "記錯了啦！";
            }
            reason.innerText = d.r;
            overlay.style.display = "flex";
        }

        function goNext() {
            document.getElementById("overlay").style.display = "none";
            curr++;
            if (curr < 20) render();
            else showFinal();
        }

        function showFinal() {
            document.getElementById("game").style.display = "none";
            const f = document.getElementById("final");
            f.style.display = "block";
            document.getElementById("score-txt").innerText = `${score} 分`;
            let msg = score >= 90 ? "你們簡直是熱戀教科書，快去洞洞裝抱抱！" : score >= 70 ? "很了解彼此的身材與癖好喔，繼續保持！" : "看來需要再通話 10 小時深度交流一下了。";
            document.getElementById("eval-txt").innerText = msg;
        }

        render();
    </script>

</body>

</html>
